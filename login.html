<?php
session_start();
include "config.php";

if($_POST){
    $user = $_POST['username'];
    $pass = md5($_POST['password']);

    $stmt = $conn->prepare("SELECT * FROM users WHERE username=? AND password=?");
    $stmt->bind_param("ss",$user,$pass);
    $stmt->execute();
    $res = $stmt->get_result();

    if($res->num_rows > 0){
        $_SESSION['mars'] = $user;
        header("Location: index.php");
    } else {
        echo "Wrong login!";
    }
}
?>
